[graph]
targets = []
all-features = true

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "0BSD",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "BSL-1.0",
    "CC0-1.0",
    "MPL-2.0",
    "OpenSSL",
    "AGPL-3.0-or-later",
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.8
private = { ignore = true }

[[licenses.clarify]]
name = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

[advisories]
ignore = [
    "RUSTSEC-2025-0020",  # PyO3 PyString::from_object - fixed in 0.24.1, we use 0.22
    "RUSTSEC-2025-0141",  # bincode unmaintained
    "RUSTSEC-2025-0119",  # number_prefix unmaintained
    "RUSTSEC-2024-0436",  # paste unmaintained
]

[bans]
multiple-versions = "warn"
wildcards = "allow"

[sources]
unknown-registry = "warn"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
