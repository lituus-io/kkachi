name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

env:
  CARGO_INCREMENTAL: 0
  CARGO_TERM_COLOR: always

jobs:
  # -- Python wheel builds (5 platforms) --

  build-wheel:
    name: Wheel (${{ matrix.name }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            maturin-args: --zig --compatibility manylinux_2_28
          - name: linux-aarch64
            runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            maturin-args: --zig --compatibility manylinux_2_28
          - name: macos-x86_64
            runner: macos-15
            target: x86_64-apple-darwin
            maturin-args: ""
          - name: macos-arm64
            runner: macos-15
            target: aarch64-apple-darwin
            maturin-args: ""
          - name: windows-x86_64
            runner: windows-latest
            target: x86_64-pc-windows-msvc
            maturin-args: ""

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: wheel-${{ matrix.name }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install maturin and zig (for Linux manylinux builds)
        run: pip install maturin ziglang

      - name: Build wheel
        working-directory: crates/kkachi-python
        run: maturin build --release --target ${{ matrix.target }} ${{ matrix.maturin-args }} --out ../../dist

      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.name }}
          path: dist/*.whl

  # -- GitHub Release --

  release:
    name: GitHub Release
    needs: [build-wheel]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect release files
        run: |
          mkdir release
          find artifacts -type f \( -name '*.tar.gz' -o -name '*.zip' -o -name '*.whl' \) -exec cp {} release/ \;
          cd release && sha256sum * > SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true

  # -- PyPI Publish --

  publish-pypi:
    name: Publish to PyPI
    needs: [build-wheel]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') && !contains(github.ref, '-')
    environment: pypi
    permissions:
      id-token: write
    steps:
      - name: Download wheels
        uses: actions/download-artifact@v4
        with:
          pattern: wheel-*
          path: dist
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_PACKAGE }}
          skip-existing: true

  # -- Crates.io Publish --

  publish-crates:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') && !contains(github.ref, '-')
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Publish kkachi to crates.io
        working-directory: crates/kkachi
        run: cargo publish --token ${{ secrets.CARGO_REGISTRY_TOKEN_KKACHI }}
